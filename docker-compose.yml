services:
  # PHP-FPM: processes .php files. Not exposed to the host — only nginx talks to it.
  php:
    build:
      context: ./docker/php
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: attest_php
    restart: unless-stopped
    volumes:
      - ./webdev-assessment-sr:/var/www/html:ro
    networks:
      - attest

  # Nginx: the public entrypoint. Serves the HTML and proxies PHP to the php service.
  nginx:
    build:
      context: ./docker/nginx
    container_name: attest_nginx
    restart: unless-stopped
    ports:
      # host:container — port 80 so http://local.atlas.com works without a port suffix
      - "80:80"
    volumes:
      - ./webdev-assessment-sr:/var/www/html:ro
    depends_on:
      - php
    networks:
      - attest

networks:
  attest:
    driver: bridge
