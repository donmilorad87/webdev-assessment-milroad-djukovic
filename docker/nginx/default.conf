server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # Allow directory browsing so you can see all the assessment files.
    autoindex on;

    # Serve static files directly; fall back to a directory/file lookup.
    location / {
        try_files $uri $uri/ =404;
    }

    # Hand .php files off to the PHP-FPM container ("php" = service name in compose).
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Don't serve the .git directory.
    location ~ /\.git {
        deny all;
    }
}
